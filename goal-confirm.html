<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Yummi · Goal-confirm screen — Lottie candidates</title>
<script src="https://cdn.jsdelivr.net/npm/lottie-web@5.12.2/build/player/lottie.min.js"></script>
<style>
  :root{
    --bg:#FBF8F1; --accent:#FF6E1F; --text:#1A1612; --muted:#75695C;
    --card:#FFFFFF; --border:#E2DBC8;
  }
  *{box-sizing:border-box}
  body{margin:0;background:#efe9dc;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;color:var(--text);padding:24px}
  h1{font-size:20px;margin:0 0 4px}
  .sub{color:var(--muted);font-size:14px;margin:0 0 24px}
  .grid{display:flex;flex-wrap:wrap;gap:24px;justify-content:center}
  .phone{
    width:300px;background:var(--bg);border-radius:34px;border:1px solid var(--border);
    padding:30px 22px 34px;box-shadow:0 14px 40px rgba(0,0,0,.12);position:relative;overflow:hidden
  }
  .tag{position:absolute;top:12px;left:14px;background:var(--accent);color:#fff;font-weight:800;
    font-size:13px;border-radius:999px;padding:3px 11px}
  .ttl{font-family:Georgia,"Times New Roman",serif;font-size:30px;font-weight:600;text-align:center;margin:18px 0 10px}
  .line{color:var(--muted);font-size:15px;line-height:21px;text-align:center;margin:0 18px 6px}
  .stage{height:230px;display:flex;align-items:center;justify-content:center;margin:8px 0}
  .halo{width:230px;height:230px;border-radius:50%;background:rgba(255,110,31,.06);
    display:flex;align-items:center;justify-content:center}
  .lot{width:200px;height:200px}
  .foot{text-align:center;font-size:17px;font-weight:600;margin-top:8px}
  .name{text-align:center;color:var(--muted);font-size:12px;margin-top:10px;letter-spacing:.4px;text-transform:uppercase}
  .ctl{display:flex;gap:8px;justify-content:center;margin-top:14px}
  .ctl button{font-size:11px;border:1px solid var(--border);background:#fff;border-radius:8px;padding:4px 8px;cursor:pointer}
</style>
</head>
<body>
  <h1>Goal-confirm screen — “That's great”</h1>
  <p class="sub">5 Lottie candidates rendered in the real screen layout (terracotta on cream). Tell me the letter you like.</p>
  <div class="grid" id="grid"></div>

<script>
  const CANDS = [
    {tag:"A", name:"Celebrate (confetti + ribbon)", file:"cand_celebrate.json", halo:true},
    {tag:"B", name:"Shine / sparkle burst",          file:"cand_shine.json",     halo:true},
    {tag:"C", name:"Success mark",                    file:"cand_success.json",   halo:true},
    {tag:"D", name:"Party poppers",                   file:"cand_poppers.json",   halo:false},
    {tag:"E", name:"Simple shapes",                   file:"cand_simple.json",    halo:true},
  ];
  const grid = document.getElementById('grid');
  CANDS.forEach(c => {
    const el = document.createElement('div');
    el.className = 'phone';
    el.innerHTML = `
      <div class="tag">${c.tag}</div>
      <div class="ttl">That's great</div>
      <div class="line">92% of users report that Yummi helps them eat healthier in the kitchen.</div>
      <div class="stage">${c.halo ? '<div class="halo"><div class="lot" id="lot-'+c.tag+'"></div></div>' : '<div class="lot" id="lot-'+c.tag+'" style="width:240px;height:240px"></div>'}</div>
      <div class="foot">We're here to help you with your goals 🤝</div>
      <div class="name">${c.tag} · ${c.name}</div>
    `;
    grid.appendChild(el);
    lottie.loadAnimation({
      container: el.querySelector('#lot-'+c.tag),
      renderer: 'svg', loop: true, autoplay: true,
      path: c.file,
    });
  });
</script>
</body>
</html>
